<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../reset.css" rel="stylesheet" />
    <link href="../global.css" rel="stylesheet" />
    <style>
        /* You can move these into your main.css later! */
        .user-list-wrapper {
            width: 890px; /* Matches your header width for perfect alignment */
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 64px;
        }
        .user-card {
            display: flex;
            align-items: center;
            padding: 24px;
            border: 1px solid #d2dae0; /* Your standard border color */
            border-radius: 8px;
            gap: 24px;
            background-color: #ffffff;
        }
        .user-card__img {
            width: 64px;
            height: 64px;
            background: #d9d9d9; /* Your standard avatar placeholder */
            border-radius: 50%;
        }
        .user-card__info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .user-card__nickname {
            font-weight: 700;
            font-size: 18px;
            color: #14212b; /* Your standard text color */
        }
        .user-card__email {
            font-weight: 400;
            font-size: 14px;
            color: #879298; /* Your standard placeholder/secondary text color */
        }
    </style>
</head>
<body>
<div class="container">

    <header class="header">
        <a href="/"><img src="../img/signiture.svg" alt="logo" /></a>
        <ul class="header__menu" style="align-items: center;">

            {{jh#if userID}}
            <li class="header__menu__item">
        <span style="font-weight: 600; color: #333; margin-right: 10px;">
          환영합니다, {{ userID }}님!
        </span>
            </li>
            <li class="header__menu__item">
                <a class="btn btn_contained btn_size_s" href="/article">글쓰기</a>
            </li>
            <li class="header__menu__item">
                <form action="/logout" method="POST" style="margin: 0;">
                    <button id="logout-btn" type="submit" class="btn btn_ghost btn_size_s">
                        로그아웃
                    </button>
                </form>
            </li>
            {{/if}}

            {{jh#ifNot userID}}
            <li class="header__menu__item">
                <a class="btn btn_contained btn_size_s" href="/login">로그인</a>
            </li>
            <li class="header__menu__item">
                <a class="btn btn_ghost btn_size_s" href="/registration">
                    회원 가입
                </a>
            </li>
            {{/ifNot}}

        </ul>
    </header>

    <div class="page">
        <h2 class="page-title">사용자 목록</h2>

        <ul class="user-list-wrapper">

            {{jh#each users}}
            <li class="user-card">
                <div class="user-card__img"></div>
                <div class="user-card__info">
                    <p class="user-card__nickname">{{ name }}</p>
                    <p class="user-card__email">{{ email }}</p>
                </div>
            </li>
            {{/each}}


        </ul>
    </div>
</div>
</body>
</html>
