<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../reset.css" rel="stylesheet" />
    <link href="../global.css" rel="stylesheet" />
    <link href="../main.css" rel="stylesheet" />
    <style>
        body {
            background-color: #fff9fb; /* 아주 연한 핑크빛 배경 */
        }
        .user-list-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 20px; /* 좀 더 둥글둥글하게 */
            border: 1px solid #ffecf2; /* 연한 핑크 테두리 */
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);
        }
        .page-title {
            color: #ff85a1; /* 화사한 핑크색 타이틀 */
            font-weight: 700;
            margin-bottom: 8px;
        }
        .user-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .user-table th {
            background-color: #fff0f5; /* 라벤더 핑크 배경 */
            color: #ff6b81;
            font-weight: 600;
            padding: 15px;
            border-bottom: 2px solid #ffdeeb;
            text-align: left;
            font-size: 14px;
        }
        .user-table td {
            padding: 15px;
            border-bottom: 1px solid #fff5f8;
            color: #555555;
            font-size: 15px;
        }
        /* 효과 제거: tr:hover 스타일 삭제 */

        .badge-no {
            display: inline-block;
            padding: 4px 10px;
            background: #ffe3ec;
            color: #ff4d7d;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <a href="/"><img src="../img/signiture.svg" /></a>
        <ul class="header__menu">
            {{header_items}} </ul>
    </header>
    <div class="wrapper">
        <div class="user-list-container">
            <h2 class="page-title">멤버 리스트 ✨</h2>
            <p style="color: #a0a0a0; font-size: 14px;">우리 서버의 소중한 멤버들을 확인해보세요.</p>

            <table class="user-table">
                <thead>
                <tr>
                    <th>No.</th>
                    <th>아이디</th>
                    <th>이름</th>
                    <th>이메일</th>
                </tr>
                </thead>
                <tbody>
                {{userList}} </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
