<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 실패 - 웹 서버 프로젝트</title>
    <link href="../css/styles.css" rel="stylesheet">
    <style>
        .error-container {
            margin-top: 50px;
            text-align: center;
        }
        .error-message {
            color: #e74c3c;
            background-color: #fceae9;
            padding: 20px;
            border-radius: 5px;
            display: inline-block;
            border: 1px solid #e74c3c;
        }
        .retry-button {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-message">
        <h2>⚠️ 로그인 실패</h2>
        <p>아이디 또는 비밀번호가 일치하지 않습니다.</p>
        <p>다시 한번 확인해 주시기 바랍니다.</p>
    </div>
    <br>
    <a href="/login/index.html" class="retry-button">다시 로그인하기</a>
    <br>
    <a href="../index.html" style="margin-top: 10px; display: inline-block; color: #7f8c8d;">메인으로 돌아가기</a>
</div>
</body>
</html>
