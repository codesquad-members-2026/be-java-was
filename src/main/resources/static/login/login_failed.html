<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../reset.css" rel="stylesheet" />
    <link href="../global.css" rel="stylesheet" />
    <style>
      .error-message {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        color: #dc2626;
        font-size: 14px;
        font-weight: 500;
        width: 320px;
      }

      .error-message::before {
        content: "!";
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #dc2626;
        color: #ffffff;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <a href="/"><img src="../img/signiture.svg" /></a>
        <ul class="header__menu">
          <li class="header__menu__item">
            <a class="btn btn_contained btn_size_s" href="/login">로그인</a>
          </li>
          <li class="header__menu__item">
            <a class="btn btn_ghost btn_size_s" href="/registration">
              회원 가입
            </a>
          </li>
        </ul>
      </header>
      <div class="page">
        <h2 class="page-title">로그인</h2>
        <form class="form" action="/user/login" method="post">
          <div class="error-message">
            아이디 또는 비밀번호가 올바르지 않습니다.
          </div>
          <div class="textfield textfield_size_s">
            <p class="title_textfield">아이디</p>
            <input
              class="input_textfield"
              name="userId"
              placeholder="아이디를 입력해주세요"
              autocomplete="username"
            />
          </div>
          <div class="textfield textfield_size_s">
            <p class="title_textfield">비밀번호</p>
            <input
              class="input_textfield"
              type="password"
              name="password"
              placeholder="비밀번호를 입력해주세요"
              autocomplete="current-password"
            />
          </div>
          <button
            class="btn btn_contained btn_size_m"
            style="margin-top: 24px"
            type="submit"
          >
            로그인
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
