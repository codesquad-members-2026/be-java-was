<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./reset.css" rel="stylesheet" />
    <link href="./global.css" rel="stylesheet" />
    <link href="./main.css" rel="stylesheet" />
</head>
<body>
<div class="container">
    <header class="header">
        <a href="/"><img src="./img/signiture.svg" /></a>
        <ul class="header__menu">
            {{#user}}
            <li class="header__menu__item">
                <span class="btn btn_ghost btn_size_s">{{userName}}</span>
            </li>
            <li class="header__menu__item">
                <a class="btn btn_contained btn_size_s" href="/article/create">글쓰기</a>
            </li>
            <li class="header__menu__item">
                <a class="btn btn_outlined btn_size_s" href="/user/logout">로그아웃</a>
            </li>
            {{/user}}
            {{^user}}
            <li class="header__menu__item">
                <a class="btn btn_contained btn_size_s" href="/login">로그인</a>
            </li>
            <li class="header__menu__item">
                <a class="btn btn_ghost btn_size_s" href="/registration">
                    회원 가입
                </a>
            </li>
            {{/user}}
        </ul>
    </header>
    <div class="wrapper">
        {{#articles}}
        <div class="post">
            <div class="post__account">
                <img class="post__account__img" />
                <p class="post__account__nickname">{{userId}}</p>
            </div>
            <img class="post__img" />
            <div class="post__menu">
                <ul class="post__menu__personal">
                    <li>
                        <button class="post__menu__btn">
                            <img src="./img/like.svg" />
                        </button>
                    </li>
                    <li>
                        <button class="post__menu__btn">
                            <img src="./img/sendLink.svg" />
                        </button>
                    </li>
                </ul>
                <button class="post__menu__btn">
                    <img src="./img/bookMark.svg" />
                </button>
            </div>
            <p class="post__article">{{content}}</p>
            <span class="post__date">{{createAt}}</span>
        </div>
        {{/articles}}
    </div>
</div>
</body>
</html>
