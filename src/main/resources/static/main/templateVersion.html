<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="../reset.css" rel="stylesheet" />
  <link href="../global.css" rel="stylesheet" />
  <link href="../main.css" rel="stylesheet" />
</head>
<body>
<div class="container">

  <header class="header">
    <a href="/main"><img src="../img/signiture.svg" /></a>
    <ul class="header__menu" style="align-items: center;">

      {{jh#if userID}}
      <li class="header__menu__item">
            <span style="font-weight: 600; color: #333; margin-right: 10px;">
              환영합니다, {{ userID }}님!
            </span>
      </li>
      <li class="header__menu__item">
        <a class="btn btn_contained btn_size_s" href="/article">글쓰기</a>
      </li>
      <li class="header__menu__item">
        <form action="/logout" method="POST" style="margin: 0;">
          <button id="logout-btn" type="submit" class="btn btn_ghost btn_size_s">
            로그아웃
          </button>
        </form>
      </li>
      {{/if}}

      {{jh#ifNot userID}}
          <li class="header__menu__item">
            <a class="btn btn_contained btn_size_s" href="/login">로그인</a>
          </li>
          <li class="header__menu__item">
            <a class="btn btn_ghost btn_size_s" href="/registration">
              회원 가입
            </a>
          </li>
      {{/ifNot}}

    </ul>
  </header>
  <div class="wrapper">
    {{jh#each articles}}
    <div class="post">
      <div class="post__account">
        <img class="post__account__img" />
        <p class="post__account__nickname">{{authorName}}</p>
      </div>

      <h3 style="padding: 0 24px; margin-top: 16px; font-weight: 600; font-size: 18px; color: #14212b;">
        {{title}}
      </h3>

      <p class="post__article">
        {{content}}
      </p>

      <div class="post__menu">
        <ul class="post__menu__personal">
          <li>
            <button class="post__menu__btn">
              <img src="../img/like.svg" />
            </button>
          </li>
          <li>
            <button class="post__menu__btn">
              <img src="../img/sendLink.svg" />
            </button>
          </li>
        </ul>
        <button class="post__menu__btn">
          <img src="../img/bookMark.svg" />
        </button>
      </div>
    </div>
    {{/each}}
</div>
</div>
</body>
</html>
