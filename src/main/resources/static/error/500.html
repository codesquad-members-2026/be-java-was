<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="../reset.css" rel="stylesheet" />
        <link href="../global.css" rel="stylesheet" />
        <link href="../main.css" rel="stylesheet" />
        <style>
            .error {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: calc(100vh - 120px);
                padding: 2rem;
                text-align: center;
            }

            .error__code {
                font-size: 8rem;
                font-weight: 800;
                line-height: 1;
                letter-spacing: -0.04em;
                color: #14212b;
                position: relative;
                margin-bottom: 0.5rem;
            }

            .error__code::after {
                content: "";
                display: block;
                width: 48px;
                height: 4px;
                background: #4362d0;
                margin: 1rem auto 0;
                border-radius: 2px;
            }

            .error__title {
                font-size: 1.25rem;
                font-weight: 600;
                color: #14212b;
                margin-top: 1.5rem;
            }

            .error__description {
                font-size: 0.938rem;
                color: #4b5966;
                line-height: 1.6;
                margin-top: 0.75rem;
                max-width: 360px;
            }

            .error__actions {
                display: flex;
                gap: 0.75rem;
                margin-top: 2rem;
            }
        </style>
    </head>
    <body>
    <div class="container">
        <header class="header">
            <a href="/static"><img src="../img/signiture.svg" /></a>
            <ul class="header__menu">
                <li class="header__menu__item">
                    <a class="btn btn_contained btn_size_s" href="/login">로그인</a>
                </li>
                <li class="header__menu__item">
                    <a class="btn btn_ghost btn_size_s" href="/registration">
                        회원 가입
                    </a>
                </li>
            </ul>
        </header>
        <div class="wrapper">
            <div class="error">
                <p class="error__code">500</p>
                <h1 class="error__title">서버에 문제가 발생했습니다</h1>
                <p class="error__description">
                    일시적인 오류가 발생했습니다. 잠시 후 다시 시도해 주세요. 문제가
                    계속되면 관리자에게 문의해 주세요.
                </p>
                <div class="error__actions">
                    <a class="btn btn_contained btn_size_m" href="/static">홈으로 돌아가기</a>
                    <a class="btn btn_ghost btn_size_m" onclick="location.reload()">
                        다시 시도
                    </a>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
