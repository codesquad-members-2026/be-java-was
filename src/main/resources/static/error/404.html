<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h1 {
            font-size: 2rem;
            margin-top: 1rem;
            font-weight: 600;
        }

        p {
            color: var(--text-sub);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .home-button {
            text-decoration: none;
            color: var(--bg-color);
            background-color: var(--accent);
            padding: 0.8rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }

        .home-button:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }

        /* 심심하지 않게 배경에 원형 장식 추가 */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
<div class="circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
<div class="circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

<div class="container">
    <div class="error-code">404</div>
    <h1>길을 잃으셨나요?</h1>
    <p>잘못된 주소를 입력하셨을 가능성이 있습니다.</p>
    <a href="/" class="home-button">메인으로 돌아가기</a>
</div>
</body>
</html>
